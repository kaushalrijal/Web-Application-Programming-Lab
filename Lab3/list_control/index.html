<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Controller</title>
</head>
<body>
    <h1>Dynamic List Controller</h1>
    <div>
        <button id="add">Add Item</button>
        <button id="remove">Remove Last Item</button>
    </div>
    <!-- item prompt -->
    <div id="prompt">
            Name: <input type="text" id="item" placeholder="Content">
            <button id="addConfirm">ADD</button>
    </div>
    <div>
        <ul id="list">
            
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
