<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Bulb Toggle</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: white;
        }

        .container {
            margin-top: 25px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 30px;
        }

        img {
            width: 260px;
            height: auto;
        }

        button {
            margin-top: 25px;
            padding: 14px 30px;
            font-size: 18px;
            cursor: pointer;
        }

        p {
            font-size: 24px;
            font-weight: bold;
            margin-top: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Light Bulb Toggle</h1>

        <img id="bulb" src="img/off.jpg" alt="Light bulb">

        <div>
            <button id="toggleBtn">Turn ON</button>
        </div>

        <p id="statusText">The bulb is OFF</p>
    </div>

    <script>
        var bulb = document.getElementById("bulb");
        var button = document.getElementById("toggleBtn");
        var statusText = document.getElementById("statusText");
        var isOn = false;

        button.addEventListener("click", function () {
            if (isOn === false) {
                bulb.src = "img/on.jpg";
                button.innerText = "Turn OFF";
                statusText.innerText = "The bulb is ON";
                isOn = true;
            } else {
                bulb.src = "img/off.jpg";
                button.innerText = "Turn ON";
                statusText.innerText = "The bulb is OFF";
                isOn = false;
            }
        });
    </script>
</body>
</html>
