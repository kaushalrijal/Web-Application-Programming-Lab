<!-- 
    Create a webpage that demonstrates the CSS Box Model. Design multiple <div> elements and apply margin, padding, border, width, and height properties to each element. Use different border styles and border radius values. Show the difference between box-sizing:content-box and box-sizing: border-box by applying them to different elemetns. Ensure proper spacing between elements so that the effect of each box model property is clearly visible.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            margin: 15px;
            padding: 32px;
            border: 4px;
            width: 400px;
            height: 200px;
            text-align: center;
            place-content: center;
            color: white;
            font-size: larger;
        }
        .border-box {
            background-color: blue;
            border-style:dotted;
            /* border-radius: 4%; */
            box-sizing: border-box;
        }
        .content-box {
            background-color: green;
            border-style:double;
            /* border-radius: 25%; */
            box-sizing: content-box;
        }
    </style>
</head>
<body>
    <div class="box border-box">
        Border Box
    </div>
    <div class="box content-box">
        Content Box
    </div>
</body>
</html>
