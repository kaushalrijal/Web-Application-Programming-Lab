<!-- 
Create a webpage that includes at least two hyperlinks using the
<a> tag. One link should open in the same tab and the other
should open in a new tab. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1</title>
</head>
<body>
    <header>
        Create a webpage that includes at least two hyperlinks using the &lt;a&gt; tag. One link should open in the same tab and the oterh should open in a new tab.
    </header>
    <hr>
    <main>
        <!-- Creating link that opens in same tab -->
        <a href="https://www.google.com" target="_self">Click me to open google in the same tab</a>
        <br>
        <!-- Creating link that opens in different tab -->
        <a href="https://www.twitter.com" target="_blank">Click me to open twitter in a new tab</a>
    </main>
</body>
</html>
